<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Booki</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <div class="main-container">
      <header class="site-header">
        <!-- LOGO -->
        <a href="#" class="logo-block">
          <div class="logo-square">
            <img
              src="images/logo/logoTT.svg"
              alt="Logo Tom Troc"
              class="logo-svg"
            />
          </div>
          <span class="logo-text">Tom Troc</span>
        </a>

        <!-- NAV -->
        <nav class="navbar">
          <a href="#" class="menu-item menu-accueil">
            <span class="menu-label">Accueil</span>
          </a>

          <a href="#" class="menu-item menu-livres">
            <span class="menu-label">Nos livres à l’échange</span>
          </a>

          <div class="separator"></div>

          <a href="#" class="messagerie-block">
            <img
              src="images/icones/messagerie.svg"
              alt="Messagerie"
              class="messagerie-icon"
            />
            <span class="menu-item menu-messagerie">
              <span class="menu-label">Messagerie</span>
            </span>
            <span class="msg-counter">12</span>
          </a>

          <a href="#" class="compte-block">
            <img
              src="images/icones/mon-compte.svg"
              alt="Mon compte"
              class="compte-icon"
            />
            <span class="menu-item menu-compte">
              <span class="menu-label">Mon compte</span>
            </span>
          </a>

          <a href="#" class="menu-item menu-connexion">
            <span class="menu-label">Connexion</span>
          </a>
        </nav>
      </header>
      <main>
        <h1>Nos livres</h1>
      </main>

      <!-- Pied de page -->
      <footer class="main-footer"></footer>
    </div>
  </body>
</html>
