<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu Responsive Tom Troc</title>

    <style>
      /* 1. RESET ET VARIABLES */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --gris-clair: #f5f3ef;
        --gris-fonc: #292929;
        --vert-principal: #00ac66;
      }

      body {
        display: flex;
        justify-content: center;
        margin: 0;
        font-family: "Inter", sans-serif;
      }

      .main-container {
        width: 100%;
        max-width: 1440px;
        background-color: bisque;
        position: relative;
      }

      /* 2. HEADER ET BARRE VERTICALE */
      .site-header {
        width: 100%;
        height: 80px;
        background: var(--gris-clair);
        display: flex;
        align-items: center;
        padding-left: clamp(40px, 10.42vw, 150px);
        padding-right: clamp(40px, 10.42vw, 150px);
        position: relative;
        white-space: nowrap;
      }

      /* Barre verticale fixe à 833px (Desktop uniquement) */
      .site-header::after {
        content: "";
        position: absolute;
        left: 833px;
        top: 50%;
        transform: translateY(-50%);
        width: 1px;
        height: 19px;
        background-color: var(--gris-fonc);
        z-index: 10;
      }

      /* LOGIQUE BURGER (Caché sur Desktop) */
      #menu-cb {
        display: none;
      }
      .burger-menu {
        display: none;
        cursor: pointer;
      }

      /* 3. LOGO */
      .logo-block {
        display: flex;
        align-items: center;
        text-decoration: none;
        gap: 15px;
        flex-shrink: 0;
      }

      .logo-square {
        width: 51px;
        height: 51px;
        border-radius: 8.5px;
        background: var(--vert-principal);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-svg {
        width: 32.311px;
        height: 25.5px;
      }

      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--vert-principal);
      }

      /* 4. NAVIGATION ET LIENS DESKTOP */
      .navbar {
        display: flex;
        align-items: center;
        flex: 1;
      }

      .nav-link {
        display: inline-flex;
        align-items: center;
        text-decoration: none;
        color: black;
        font-weight: 400;
        font-size: 14px;
        gap: 4px;
      }

      /* TECHNIQUE ANTI-DÉCALAGE */
      .nav-link span,
      .nav-link .text-wrapper {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
      }

      .nav-link span::after,
      .nav-link .text-wrapper::after {
        content: attr(data-text);
        height: 0;
        visibility: hidden;
        overflow: hidden;
        user-select: none;
        pointer-events: none;
        font-weight: 600;
      }

      .nav-link:hover {
        font-weight: 600;
      }

      /* COMPOSANTS (Messagerie & Compte) */
      .messagerie-icon {
        width: 15px;
        height: 13.129px;
      }
      .msg-counter {
        width: 10.5px;
        height: 15px;
        border-radius: 6.75px;
        background: var(--gris-fonc);
        color: var(--gris-clair);
        font-size: 8.25px;
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .compte-icon {
        width: 9.286px;
        height: 9.286px;
        border-radius: 9.286px;
        background: #d9d9d9;
      }

      /* ESPACEMENTS PRÉCIS DESKTOP */
      .navbar .nav-link:nth-child(1) {
        margin-left: 78px;
      }
      .navbar .nav-link:nth-child(2) {
        margin-left: 44px;
      }
      .navbar .nav-link:nth-child(3) {
        margin-left: 285px;
      }
      .navbar .nav-link:nth-child(4) {
        margin-left: 58px;
      }
      .navbar .nav-link:nth-child(5) {
        margin-left: 58px;
      }

      .user-disconnected .complex-link {
        visibility: hidden; /* Rend invisible mais garde l'espace */
        pointer-events: none; /* Empêche de cliquer sur le lien invisible */
        user-select: none; /* Empêche de sélectionner le texte invisible */
      }

      /* 5. VERSION MOBILE (375px) */
      @media (max-width: 375px) {
        .site-header {
          height: 56px;
          padding: 0 20px;
          justify-content: flex-start; /* Aligne les éléments au début (gauche) */
        }

        .site-header::after {
          display: none;
        }

        /* Affichage Burger à DROITE */
        .burger-menu {
          display: block;
          margin-left: auto; /* Pousse le bouton burger tout à fait à droite */
        }

        /* Logo réduit à GAUCHE */
        .logo-block {
          gap: 7.55px;
        }
        .logo-square {
          width: 25.665px;
          height: 25.665px;
          border-radius: 4.277px;
        }
        .logo-svg {
          width: 16.26px;
          height: 12.832px;
        }
        .logo-text {
          font-size: 10.065px;
        }

        /* Navigation Mobile déroulante */
        .navbar {
          display: none;
          position: absolute;
          top: 56px;
          left: 0;
          width: 100%;
          flex-direction: column;
          /* background: var(--gris-clair); */
          background: white;
          z-index: 100;
        }

        /* Checkbox Hack pour ouvrir le menu */
        #menu-cb:checked ~ .navbar {
          display: flex;
        }

        .nav-link {
          width: 100%;
          height: 56px;
          padding-left: 20px;
          margin-left: 0 !important;
          border-bottom: 1px solid #e0e0e0;
          font-weight: 600;
          justify-content: flex-start;
        }

        .nav-link span::after,
        .nav-link .text-wrapper::after {
          display: none;
        }

        .user-disconnected .complex-link {
          display: none;
        }
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <header class="site-header">
        <a href="#" class="logo-block">
          <div class="logo-square">
            <img
              src="images/logo/logoTT.svg"
              alt="Logo Tom Troc"
              class="logo-svg"
            />
          </div>
          <span class="logo-text">Tom Troc</span>
        </a>

        <input type="checkbox" id="menu-cb" />
        <label for="menu-cb" class="burger-menu">
          <img src="images/icones/icon-menu.svg" alt="Menu" />
        </label>

        <nav class="navbar user-disconnected">
          <a href="#" class="nav-link"
            ><span data-text="Accueil">Accueil</span></a
          >
          <a href="#" class="nav-link"
            ><span data-text="Nos livres à l'échange"
              >Nos livres à l'échange</span
            ></a
          >

          <a href="#" class="nav-link complex-link">
            <img
              src="images/icones/messagerie.svg"
              alt=""
              class="messagerie-icon"
            />
            <span class="text-wrapper" data-text="Messagerie">Messagerie</span>
            <div class="msg-counter">3</div>
          </a>

          <a href="#" class="nav-link complex-link">
            <img
              src="images/icones/mon-compte.svg"
              alt=""
              class="compte-icon"
            />
            <span class="text-wrapper" data-text="Mon compte">Mon compte</span>
          </a>

          <a href="#" class="nav-link"
            ><span data-text="Connexion">Connexion</span></a
          >
        </nav>
      </header>

      <main>
        <h1>test test</h1>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
        <h2>test test</h2>
      </main>
    </div>
  </body>
</html>
