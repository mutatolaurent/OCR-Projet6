<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion</title>
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="main-container">
      <header class="site-header">
        <a href="#" class="logo-block">
          <div class="logo-square">
            <img
              src="../images/logo/logoTT.svg"
              alt="Logo Tom Troc"
              class="logo-svg"
            />
          </div>
          <span class="logo-text">Tom Troc</span>
        </a>

        <input type="checkbox" id="menu-cb" />
        <label for="menu-cb" class="burger-menu">
          <img src="../images/icones/icon-menu.svg" alt="Menu" />
        </label>

        <nav class="navbar">
          <a href="#" class="nav-link"
            ><span data-text="Accueil">Accueil</span></a
          >
          <a href="#" class="nav-link"
            ><span data-text="Nos livres à l'échange"
              >Nos livres à l'échange</span
            ></a
          >

          <a href="#" class="nav-link complex-link">
            <img
              src="../images/icones/messagerie.svg"
              alt=""
              class="messagerie-icon"
            />
            <span class="text-wrapper" data-text="Messagerie">Messagerie</span>
            <div class="msg-counter">3</div>
          </a>

          <a href="#" class="nav-link complex-link">
            <img
              src="../images/icones/mon-compte.svg"
              alt=""
              class="compte-icon"
            />
            <span class="text-wrapper" data-text="Mon compte">Mon compte</span>
          </a>

          <a href="#" class="nav-link"
            ><span data-text="Connexion">Connexion</span></a
          >
        </nav>
      </header>

      <main>
        <section class="insc-main-sect">
          <div class="insc-part-left">
            <h1>Connexion</h1>
            <form action="#" method="POST">
              <div class="champ-formulaire">
                <label for="email">Adresse mail</label>
                <input
                  class="input-error"
                  type="text"
                  name="email"
                  id="email"
                  value="nathalie@gmail.com"
                  placeholder="nom@exemple.com"
                  aria-required="true"
                  required
                />
                <span class="text-error">Message en cas d'erreur</span>
              </div>
              <div class="champ-formulaire">
                <label for="password">Mot de passe</label>
                <input
                  type="password"
                  name="password"
                  id="password"
                  placeholder="Au moins 6 caractères"
                  aria-required="true"
                  required
                />
                <span class="text-error">Message en cas d'erreur</span>
              </div>
              <button class="btn btn-filled">Se connecter</button>
            </form>
            <span
              >Pas de compte ?
              <a href="#" class="edit-link">Inscrivez vous</a></span
            >
          </div>
          <div class="insc-part-right">
            <img src="../images/inscription/bibliotheque.jpg" alt="" />
          </div>
        </section>
      </main>

      <footer class="main-footer">
        <a href="#">Politique de confidentialité</a>
        <a href="#">Mentions légales</a>
        <a href="#">Tom Troc©</a>
        <a href="#"
          ><img src="../images/logo/logoTT-vert.svg" alt="Logo Tom Troc vert"
        /></a>
      </footer>
    </div>
  </body>
</html>
