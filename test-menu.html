<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Menu horizontal</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --Gris-clair: #f5f3ef;
        --Gris-fonc: #292929;
        --Vert-principal: #00ac66;
        --gap-col-nos-livres: 38px;
        --gap-row-nos-livres: 48px;
      }
      body {
        display: flex;
        justify-content: center;
        margin: 0;
      }

      .main-container {
        width: 100%;
        max-width: 1440px;
        background-color: bisque;
      }

      .site-header {
        width: 100%;
        /* max-width: 1440px; */
        height: 80px;
        background: var(--Gris-clair);
        display: flex;
        align-items: center;
        /* margin: 0 auto; */
        padding-left: clamp(40px, 10.42vw, 150px);
        padding-right: clamp(40px, 10.42vw, 150px);
        white-space: nowrap;
        font-family: Inter, sans-serif;
      }
      /* LOGO */
      .logo-block {
        display: flex;
        align-items: center;
        text-decoration: none;
        gap: 15px;
        flex-shrink: 0;
      }

      .logo-square {
        width: 51px;
        height: 51px;
        border-radius: 8.5px;
        background: var(--Vert-principal);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-svg {
        width: 32.311px;
        height: 25.5px;
      }

      .logo-text {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-weight: 600;
        color: var(--Vert-principal);
      }
      /* Barre de navigation */

      .navbar {
        display: flex;
        flex: 1;
        align-items: center;
        margin-left: auto;
        white-space: nowrap;
      }

      /* Items du menu */
      nav a {
        flex: 1; /* chaque item prend la même largeur */
        text-align: center;
        padding: 15px 0;
        text-decoration: none;
        color: black;
        font-weight: 400;
        font-size: 14px;
      }

      /* Effet hover */
      nav a:hover {
        font-weight: 600;
      }
    </style>
  </head>

  <body>
    <div class="main-container">
      <header class="site-header">
        <a href="#" class="logo-block">
          <div class="logo-square">
            <img
              src="images/logo/logoTT.svg"
              alt="Logo Tom Troc"
              class="logo-svg"
            />
          </div>
          <span class="logo-text">Tom Troc</span>
        </a>
        <nav class="navbar">
          <a href="#">Accueil</a>
          <a href="#">Nos livres à l'échange</a>
          <a href="#">Messagerie</a>
          <a href="#">Mon compte</a>
          <a href="#">Connexion</a>
        </nav>
      </header>
    </div>
  </body>
</html>
